<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>明月自助餐計價</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding: 30px;
    }
    h1 {
      color: #333;
    }
    .menu {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .item {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
    #total {
      font-size: 20px;
      margin-top: 15px;
      color: #d32f2f;
    }
  </style>
</head>
<body>

  <h1>🍱 明月自助餐</h1>

  <div class="menu">

    <div class="item">
      排骨便當 (100)
      <input type="number" min="0" value="0" id="pork">
    </div>

    <div class="item">
      控肉便當 (100)
      <input type="number" min="0" value="0" id="braised">
    </div>

    <div class="item">
      雞腿便當 (110)
      <input type="number" min="0" value="0" id="chicken">
    </div>

    <div class="item">
      紅糟肉便當 (110)
      <input type="number" min="0" value="0" id="redmeat">
    </div>

    <div class="item">
      豬腳蹄便當 (100)
      <input type="number" min="0" value="0" id="trotter">
    </div>

    <div class="item">
      豬腳中段便當 (110)
      <input type="number" min="0" value="0" id="middle">
    </div>

    <div class="item">
      菜飯便當 (65)
      <input type="number" min="0" value="0" id="veg">
    </div>

    <button onclick="calculate()">計算總價</button>

    <div id="total">總價：0 元</div>

  </div>

  <script>
    function calculate() {
      let total =
        document.getElementById("pork").value * 100 +
        document.getElementById("braised").value * 100 +
        document.getElementById("chicken").value * 110 +
        document.getElementById("redmeat").value * 110 +
        document.getElementById("trotter").value * 100 +
        document.getElementById("middle").value * 110 +
        document.getElementById("veg").value * 65;

      document.getElementById("total").innerText = "總價：" + total + " 元";
    }
  </script>

</body>
</html>
